<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Photo RM / AF</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1f2435;
  --border: #2a3045;
  --border2: #353d56;
  --text: #e8ecf5;
  --muted: #6b7799;
  --muted2: #9aa3bf;
  --blue: #3b82f6;
  --blue-dim: #1e3a5f;
  --green: #22c55e;
  --green-dim: #14532d;
  --orange: #f97316;
  --orange-dim: #431407;
  --red: #ef4444;
  --red-dim: #450a0a;
  --yellow: #eab308;
  --yellow-dim: #422006;
  --rm: #3b82f6;
  --rm-dim: #1e3a5f;
  --af: #a855f7;
  --af-dim: #3b0764;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.5px;
  white-space: nowrap;
}

.logo .rm { color: var(--rm); }
.logo .sep { color: var(--muted); margin: 0 4px; }
.logo .af { color: var(--af); }

.tabs {
  display: flex;
  gap: 4px;
  flex: 1;
}

.tab {
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--muted2);
  background: none;
  border: none;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}

.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { background: var(--blue-dim); color: var(--blue); }
.tab.active.tso { background: rgba(34,197,94,0.12); color: var(--green); }

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}

.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(59,130,246,0.4); }
.btn-ghost { background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.btn-green:hover { background: var(--green); color: #fff; }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}

.stat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
}

.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* TOOLBAR */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 340px;
}

.search-box svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 8px 10px 8px 34px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border 0.2s;
}

.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--blue); }

.filter-select {
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: border 0.2s;
}

.filter-select:focus { border-color: var(--blue); }
.filter-select option { background: var(--surface2); }

/* TABLE */
.main-content {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  overflow: hidden;
}

.table-wrap {
  padding: 0 24px 24px;
  overflow: auto;
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--surface2);
  color: var(--muted2);
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 10;
  cursor: pointer;
  user-select: none;
}

thead th:hover { color: var(--text); }
thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
thead th.sorted .sort-icon { opacity: 1; color: var(--blue); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  animation: rowIn 0.2s ease both;
}

tbody tr:hover { background: var(--surface2); }

@keyframes rowIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

td {
  padding: 10px 14px;
  vertical-align: middle;
}

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-rm { background: var(--rm-dim); color: var(--rm); border: 1px solid rgba(59,130,246,0.3); }
.badge-af { background: var(--af-dim); color: var(--af); border: 1px solid rgba(168,85,247,0.3); }
.badge-oui { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.badge-non { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.badge-plp { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
.badge-fac { background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
.badge-ok { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

.cam-cell { max-width: 260px; }
.cam-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted2); font-size: 12px; }
.cam-text:hover { white-space: normal; overflow: visible; background: var(--surface); z-index: 10; position: relative; padding: 4px; border-radius: 4px; }

.actions-cell { display: flex; gap: 6px; }
.icon-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-dim); }
.icon-btn.del:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-state svg { margin-bottom: 14px; opacity: 0.3; }
.empty-state p { font-size: 15px; }

/* MODAL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 600px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.modal-close:hover { color: var(--text); background: var(--surface2); }

.modal-body { padding: 20px 24px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }

.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.form-input, .form-select, .form-textarea {
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border 0.2s;
  width: 100%;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.form-select option { background: var(--surface2); }
.form-textarea { resize: vertical; min-height: 70px; }

.modal-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
}

/* TSO Table specifics */
.tso-verif { max-width: 320px; font-size: 12px; color: var(--muted2); }

/* Responsive */
@media (max-width: 768px) {
  .stats-bar { padding: 12px 16px; }
  .toolbar { padding: 10px 16px; }
  .table-wrap { padding: 0 8px 24px; }
  header { padding: 0 16px; gap: 10px; }
}

/* Tooltip pour texte long */
.tooltip-cell {
  position: relative;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: default;
}

.tooltip-cell:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
  white-space: normal;
  width: 280px;
  z-index: 999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  line-height: 1.5;
}

</style>

// ===================== UI =====================
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  sortCol = null;
  document.getElementById('filterType').style.display = tab === 'cam' ? '' : 'none';
  document.getElementById('filterOkCam').style.display = tab === 'cam' ? '' : 'none';
  applyFilters();
  renderStats();
}

function getFilteredData() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filterType = document.getElementById('filterType').value;
  const filterEnt = document.getElementById('filterEntreprise').value;
  const filterOk = document.getElementById('filterOkCam').value;

  if (currentTab === 'cam') {
    return camData.filter((r, i) => {
      r._idx = i;
      const s = `${r.type} ${r.code} ${r.nd} ${r.technicien} ${r.entreprise} ${r.avisCam} ${r.okCam}`.toLowerCase();
      return (!search || s.includes(search))
        && (!filterType || r.type === filterType)
        && (!filterEnt || r.entreprise === filterEnt)
        && (!filterOk || r.okCam === filterOk);
    });
  } else {
    return tsoData.filter((r, i) => {
      r._idx = i;
      const s = `${r.nd} ${r.technicien} ${r.partenaire} ${r.verification}`.toLowerCase();
      return (!search || s.includes(search))
        && (!filterEnt || r.partenaire === filterEnt);
    });
  }
}

function populateEntrepriseFilter() {
  const sel = document.getElementById('filterEntreprise');
  const current = sel.value;
  const list = currentTab === 'cam'
    ? [...new Set(camData.map(r => r.entreprise).filter(Boolean))].sort()
    : [...new Set(tsoData.map(r => r.partenaire).filter(Boolean))].sort();
  sel.innerHTML = `<option value="">${currentTab === 'cam' ? 'Toutes entreprises' : 'Tous partenaires'}</option>`
    + list.map(e => `<option value="${e}" ${e===current?'selected':''}>${e}</option>`).join('');
}

function applyFilters() {
  populateEntrepriseFilter();
  const data = getFilteredData();
  if (sortCol !== null) {
    data.sort((a, b) => {
      const av = a[sortCol] || '';
      const bv = b[sortCol] || '';
      return av.toString().localeCompare(bv.toString()) * sortDir;
    });
  }
  renderTable(data);
  renderStats();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  applyFilters();
}

// ===================== STATS =====================
function renderStats() {
  const bar = document.getElementById('statsBar');
  if (currentTab === 'cam') {
    const total = camData.length;
    const rm = camData.filter(r => r.type === 'RM').length;
    const af = camData.filter(r => r.type === 'AF').length;
    const facRm = camData.filter(r => (r.okCam||'').toUpperCase().includes('FAC RM')).length;
    const facAf = camData.filter(r => (r.okCam||'').toUpperCase().includes('FAC AF')).length;
    const okCount = camData.filter(r => (r.okCam||'').toUpperCase() === 'FAC OK').length;
    bar.innerHTML = `
      <div class="stat-card"><div class="stat-dot" style="background:#6b7799"></div><div><div class="stat-val">${total}</div><div class="stat-lbl">Total</div></div></div>
      <div class="stat-card"><div class="stat-dot" style="background:var(--rm)"></div><div><div class="stat-val" style="color:var(--rm)">${rm}</div><div class="stat-lbl">RM</div></div></div>
      <div class="stat-card"><div class="stat-dot" style="background:var(--af)"></div><div><div class="stat-val" style="color:var(--af)">${af}</div><div class="stat-lbl">AF</div></div></div>
      <div class="stat-card"><div class="stat-dot" style="background:var(--green)"></div><div><div class="stat-val" style="color:var(--green)">${okCount}</div><div class="stat-lbl">FAC OK</div></div></div>
      <div class="stat-card"><div class="stat-dot" style="background:var(--orange)"></div><div><div class="stat-val" style="color:var(--orange)">${facRm}</div><div class="stat-lbl">FAC RM</div></div></div>
      <div class="stat-card"><div class="stat-dot" style="background:var(--af)"></div><div><div class="stat-val" style="color:var(--af)">${facAf}</div><div class="stat-lbl">FAC AF</div></div></div>
    `;
  } else {
    const total = tsoData.length;
    const ok = tsoData.filter(r => (r.verification||'').toLowerCase().includes('ok')).length;
    const nok = total - ok;
    bar.innerHTML = `
      <div class="stat-card"><div class="stat-dot" style="background:#6b7799"></div><div><div class="stat-val">${total}</div><div class="stat-lbl">Total TSO</div></div></div>

      <div class="stat-card"><div class="stat-dot" style="background:var(--red)"></div><div><div class="stat-val" style="color:var(--red)">${nok}</div><div class="stat-lbl">Non conformes</div></div></div>
    `;
  }
}

// ===================== TABLES =====================
function badgeOk(val) {
  if (!val) return `<span class="badge" style="background:var(--surface2);color:var(--muted)">—</span>`;
  const v = val.toUpperCase();
  if (v === 'FAC OK') return `<span class="badge badge-ok">✓ FAC OK</span>`;
  if (v.includes('FAC RM')) return `<span class="badge badge-fac">FAC RM</span>`;
  if (v.includes('FAC AF')) return `<span class="badge" style="background:var(--af-dim);color:var(--af);border:1px solid rgba(168,85,247,.3)">FAC AF</span>`;
  if (v.includes('PLP')) return `<span class="badge badge-plp">PLP OK</span>`;
  if (v === 'OUI' || v === 'OK') return `<span class="badge badge-ok">✓ ${val}</span>`;
  return `<span class="badge" style="background:var(--surface2);color:var(--muted2);border:1px solid var(--border)">${val}</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
  return d;
}

function renderTable(data) {

  document.getElementById('rowCount').textContent = `${data.length} entrée${data.length !== 1 ? 's' : ''}`;

  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Aucun résultat trouvé</p></div>`;
    return;
  }

  if (currentTab === 'cam') {
    const th = (key, label) => `<th onclick="sortBy('${key}')">${label} <span class="sort-icon">${sortCol===key?(sortDir===1?'↑':'↓'):'↕'}</span></th>`;
    container.innerHTML = `
    <table>
      <thead><tr>
        ${th('type','Type')}${th('code','Code')}${th('nd','ND')}${th('date','Date')}
        ${th('technicien','Technicien')}${th('entreprise','Entreprise')}
        ${th('appelEffectue','Appel')}
        <th>Avis CAM</th><th>Avis Tholonet</th>
        ${th('okCam','Etat Facture')}
        <th>Actions</th>
      </tr></thead>
      <tbody>
      ${data.map(r => `<tr>
        <td><span class="badge ${r.type === 'RM' ? 'badge-rm' : 'badge-af'}">${r.type}</span></td>
        <td><code style="color:var(--blue);font-size:12px">${r.code||'—'}</code></td>
        <td style="font-family:monospace;font-size:12px;color:var(--text)">${r.nd||'—'}</td>
        <td style="color:var(--muted2);font-size:12px">${formatDate(r.date)}</td>
        <td style="font-weight:500">${r.technicien||'—'}</td>
        <td style="color:var(--muted2)">${r.entreprise||'—'}</td>
        <td><span class="badge ${(r.appelEffectue||'').toLowerCase()==='oui' ? 'badge-oui' : 'badge-non'}">${r.appelEffectue||'—'}</span></td>
        <td class="tooltip-cell" data-tip="${(r.avisCam||'').replace(/"/g,'&quot;')}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2);font-size:12px">${r.avisCam||'—'}</td>
        <td class="tooltip-cell" data-tip="${(r.avisTholonet||'').replace(/"/g,'&quot;')}" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2);font-size:12px">${r.avisTholonet||'—'}</td>
        <td>${badgeOk(r.okCam)}</td>
        <td><div class="actions-cell">
          <button class="icon-btn" onclick="openModal(${r._idx})" title="Modifier">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn del" onclick="deleteEntry(${r._idx})" title="Supprimer">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div></td>
      </tr>`).join('')}
      </tbody>
    </table>`;
  } else {
    const th = (key, label) => `<th onclick="sortBy('${key}')">${label} <span class="sort-icon">${sortCol===key?(sortDir===1?'↑':'↓'):'↕'}</span></th>`;
    container.innerHTML = `
    <table>
      <thead><tr>
        ${th('nd','ND')}${th('technicien','Technicien')}${th('partenaire','Partenaire')}
        <th>Vérification</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
      ${data.map(r => `<tr>
        <td style="font-family:monospace;font-size:12px;color:var(--text)">${r.nd||'—'}</td>
        <td style="font-weight:500">${r.technicien||'—'}</td>
        <td style="color:var(--muted2)">${r.partenaire||'—'}</td>
        <td class="tooltip-cell" data-tip="${(r.verification||'').replace(/"/g,'&quot;')}" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2);font-size:12px">${r.verification||'—'}</td>

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

  }
}

// ===================== MODAL =====================

      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-select" id="f_type">

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editIndex = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveEntry() {
  if (currentTab === 'cam') {
    const nd = document.getElementById('f_nd').value.trim();
    if (!nd) { alert('Le ND est requis.'); return; }
    const entry = {
      type: document.getElementById('f_type').value,
      code: document.getElementById('f_code').value.trim(),
      nd,
      date: document.getElementById('f_date').value,
      technicien: document.getElementById('f_technicien').value.trim(),
      entreprise: document.getElementById('f_entreprise').value.trim(),
      appelEffectue: document.getElementById('f_appel').value,
      avisCam: document.getElementById('f_avisCam').value.trim(),
      avisTholonet: document.getElementById('f_avisTholonet').value.trim(),
      okCam: document.getElementById('f_okCam').value,
      moral: document.getElementById('f_moral').value.trim(),
    };
    if (editIndex !== null) camData[editIndex] = entry;
    else camData.unshift(entry);
  } else {
    const nd = document.getElementById('f_nd').value.trim();
    if (!nd) { alert('Le ND est requis.'); return; }
    const entry = {
      nd,
      technicien: document.getElementById('f_technicien').value.trim(),
      partenaire: document.getElementById('f_partenaire').value.trim(),
      verification: document.getElementById('f_verification').value.trim(),
    };
    if (editIndex !== null) tsoData[editIndex] = entry;
    else tsoData.unshift(entry);
  }
  save();
  closeModal();
  applyFilters();
}

function deleteEntry(idx) {
  if (!confirm('Supprimer cette entrée ?')) return;
  if (currentTab === 'cam') camData.splice(idx, 1);
  else tsoData.splice(idx, 1);
  save();
  applyFilters();
}

// ===================== EXPORT / IMPORT JSON =====================
function exportJSON() {
  const data = { cam: camData, tso: tsoData };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `suivi_rm_af_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.cam && data.tso) {
        camData = data.cam;
        tsoData = data.tso;
        save();
        applyFilters();
        renderStats();
        alert('✅ Données chargées avec succès !');
      } else {
        alert('❌ Fichier invalide.');
      }
    } catch(err) {
      alert('❌ Erreur lors de la lecture du fichier.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===================== EXPORT CSV =====================
function exportCSV() {
  let csv, filename;
  if (currentTab === 'cam') {
    const headers = ['Type','Code','ND','Date','Technicien','Entreprise','Appel Effectué','Avis CAM','Avis Tholonet','Etat Facture','Moral'];
    const rows = camData.map(r => [r.type,r.code,r.nd,r.date,r.technicien,r.entreprise,r.appelEffectue,r.avisCam,r.avisTholonet,r.okCam,r.moral]);
    csv = [headers, ...rows].map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
    filename = 'suivi_cam.csv';
  } else {
    const headers = ['ND','Technicien','Partenaire','Vérification'];
    const rows = tsoData.map(r => [r.nd,r.technicien,r.partenaire,r.verification]);
    csv = [headers, ...rows].map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
    filename = 'suivi_tso.csv';
  }
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
}

// ===================== INIT =====================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey||e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
});

// Init filters visibility
document.getElementById('filterType').style.display = '';
document.getElementById('filterOkCam').style.display = '';

applyFilters();
renderStats();
</script>
